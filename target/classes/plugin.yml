name: mLinker
main: com.blockstock.mlinker.MLinker
version: 0.2.0-BETA
author: musbabaff
description: >
  Discord ↔ Minecraft account linking, verification and reward system.
  Fully modular structure with MySQL, SQLite, and YAML support.
api-version: 1.19
prefix: mLinker

softdepend:
  - Vault
  - LuckPerms
  - PlaceholderAPI

commands:
  hesapesle:
    description: Discord hesabını Minecraft hesabınla eşleştirmeni sağlar.
    usage: /hesapesle
    aliases: [mlink, link, hesap]
    permission: mlinker.use

  hesapkaldir:
    description: Discord eşleşmesini kaldırır.
    usage: /hesapkaldir
    aliases: [munlink, unlink, unlinkaccount, kaldir]
    permission: mlinker.use

  mlinkerreload:
    description: mLinker yapılandırma dosyalarını yeniden yükler.
    usage: /mlinkerreload
    aliases: [mreload, mrl]
    permission: mlinker.admin

  mlinkerinfo:
    description: mLinker durumu, sürüm bilgisi ve API detaylarını gösterir.
    usage: /mlinkerinfo
    aliases: [minfo, mver]
    permission: mlinker.admin

  mreverify:
    description: Akıllı yeniden doğrulama sistemini manuel olarak başlatır.
    usage: /mreverify
    aliases: [reverify, linkcheck]
    permission: mlinker.admin

permissions:
  mlinker.use:
    description: Hesap eşleştirme ve kaldırma komutlarını kullanma izni.
    default: true

  mlinker.admin:
    description: mLinker yöneticisi izinleri.
    default: op

  mlinker.rewards:
    description: Ödül sistemine erişim izni.
    default: op

  mlinker.reverify:
    description: Yeniden doğrulama sistemini manuel başlatma izni.
    default: op

  mlinker.api:
    description: mLinkerAPI erişimi ve yönetimi.
    default: op

load: POSTWORLD

authors:
  - musbabaff
  - BlockStock.art
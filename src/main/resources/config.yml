#
# Config version — DO NOT CHANGE
# Used for automatic config migration
config-version: 2

# Your server name (used in Discord embeds and logs)
server-name: "My Server"

# Enable debug logging in the console
debug: false

# Enables automatic update checks
update-checker: true

# Enables or disables metrics collection via BStats
metrics: true

# ┌──────────────────────────────────────────────────────────────────────┐
# │  LANGUAGE & LOCALIZATION                                             │
# ├──────────────────────────────────────────────────────────────────────┤
# │  Supported: en, tr, de, es, fr                                       │
# │  Custom languages: Create locales/xx.yml in plugin folder            │
# │  Missing keys automatically fall back to English                     │
# └──────────────────────────────────────────────────────────────────────┘
language: en

# ┌──────────────────────────────────────────────────────────────────────┐
# │  SMART RE-VERIFICATION                                               │
# ├──────────────────────────────────────────────────────────────────────┤
# │  Periodically checks if linked players are still in Discord          │
# │  Prevents "join-quit-farm" abuse                                     │
# └──────────────────────────────────────────────────────────────────────┘
reverify:
  enabled: true
  interval-hours: 6
  # Options: "unlink" (remove link) or "notify" (log only)
  action: "notify"
  log-channel-id: ""

# ┌──────────────────────────────────────────────────────────────────────┐
# │  LINK SETTINGS                                                       │
# ├──────────────────────────────────────────────────────────────────────┤
# │  Configure code generation and expiration                            │
# └──────────────────────────────────────────────────────────────────────┘
link:
  expire-seconds: 300
  code-length: 6
  max-active-codes: 1

# ┌──────────────────────────────────────────────────────────────────────┐
# │  DISCORD BOT                                                         │
# ├──────────────────────────────────────────────────────────────────────┤
# │  Main Discord integration settings                                   │
# │  Required: bot-token, guild-id                                       │
# └──────────────────────────────────────────────────────────────────────┘
discord:
  enabled: true
  bot-token: "BOT_TOKEN_HERE"
  guild-id: ""
  role-id-verified: ""

  # ── Rotating Bot Status ────────────────────────────────────────────── 
  # Variables: {online}, {max}, {linked}
  # Types: PLAYING, WATCHING, LISTENING
  status:
    rotate: true
    interval: 15
    messages:
      - "PLAYING:⚡ {online}/{max} Players Online"
      - "WATCHING:🔗 {linked} Accounts Linked"
      - "PLAYING:⭐ CordSync | /link"
      - "LISTENING:🎮 Minecraft Server"

  # ── LuckPerms Role Sync ─────────────────────────────────────────────
  # Maps LuckPerms groups to Discord roles
  luckperms-roles:
    enabled: false
    mappings:
      "vip": "DISCORD_ROLE_ID_HERE"
      "vip+": "DISCORD_ROLE_ID_HERE"
      "mvip+": "DISCORD_ROLE_ID_HERE"

  # ── Log Channel ─────────────────────────────────────────────────────
  # All events (link/unlink/join/leave) logged here
  log-channel-id: ""

  # ── Auto Message ────────────────────────────────────────────────────
  # Premium embed with interactive buttons sent on startup
  auto-message:
    enabled: true
    channel-id: ""
    embed-title: "🎉 Welcome to CordSync!"
    embed-description: "**Elevate your experience with us!** Dive into a world where your Minecraft account syncs seamlessly with Discord. We create experiences that keep players coming back for more.\n\n• ✨ **Unlock Exclusive Roles**: Get premium roles instantly.\n• 🎁 **Claim Daily Rewards**: Earn rewards just for being linked.\n• 💬 **Cross-Platform Chat**: Talk to players directly from Discord.\n\nReady to get started? Read the guide below."
    embed-color: "#FF8C00"
    embed-thumbnail: ""
    embed-image: ""
    button-details: "**📖 How to Link:**\n\n1️⃣ Type `/link` in Minecraft\n2️⃣ Copy the 6-digit code\n3️⃣ Click **🔗 Link Account** below\n4️⃣ Enter your code in the form\n5️⃣ Confirm the linking\n\n✅ **Done!** Your account is now linked."

  # ── Booster Info Message ────────────────────────────────────────────
  booster-message:
    enabled: true
    channel-id: ""
    embed-title: "🚀 Server Booster Rewards"
    embed-description: "Thank you for boosting! Link your account to claim exclusive in-game rewards."
    embed-color: "#FF73FA"
    embed-thumbnail: ""
    button-details: "🎁 **Booster Rewards Include:**\n\n💰 **10,000 Coins** — Spend in the shop\n⭐ **30-Day Booster Role** — Exclusive perks\n💎 **1x Netherite Ingot** — Premium material\n🏷️ **[Booster] Tag** — Show off in chat\n\n*Rewards are granted automatically when you link your account.*"

  # ── Nickname Sync ───────────────────────────────────────────────────
  # Updates Discord nickname to match Minecraft username
  nickname-sync:
    enabled: false
    format: "[{mcname}] {discordname}"
    reset-on-unlink: true

  # ── Join/Quit Messages ──────────────────────────────────────────────
  join-quit-messages:
    enabled: true
    channel-id: ""

  # ── Reverse Sync (Discord -> LuckPerms) ─────────────────────────────
  reverse-sync:
    enabled: false
    mappings:
      # Discord Role ID: LuckPerms group name
      "DISCORD_ROLE_ID_HERE": "booster"



# ┌──────────────────────────────────────────────────────────────────────┐
# │  SECURITY & ANTI-ABUSE                                               │
# ├──────────────────────────────────────────────────────────────────────┤
# │  Comprehensive protection against link abuse and farming             │
# └──────────────────────────────────────────────────────────────────────┘
security:
  # Cooldown after unlinking before re-linking
  unlink-cooldown: "24h"
  # Maximum number of re-link attempts (0 = unlimited)
  max-relink-count: 3
  # Only give first-link reward once per player
  first-reward-once: true

  # ── 2FA Login System ────────────────────────────────────────────────
  # Two-Factor Authentication for server login
  # When enabled, linked players must approve login via Discord DM
  # Protects against unauthorized account access
  2fa-login:
    enabled: false
    # Approved session duration in minutes (player won't need to re-approve)
    session-duration: 60
    # Timeout for responding to the 2FA DM request in seconds
    request-timeout-seconds: 300
    # Channel to log 2FA approvals, denials and timeouts
    2fa-log-channel-id: ""
    # Censor IP addresses in Discord messages (shows first 2 octets only)
    censor-ip: true

# ┌──────────────────────────────────────────────────────────────────────┐
# │  CHAT BRIDGE (MC ↔ Discord)                                          │
# ├──────────────────────────────────────────────────────────────────────┤
# │  Bidirectional chat relay between Minecraft and Discord              │
# └──────────────────────────────────────────────────────────────────────┘
chat-bridge:
  enabled: false
  channel-id: ""
  discord-format: "**{player}**: {message}"
  minecraft-format: "&7[&bDiscord&7] &f{player}&7: &f{message}"
  # Options: ALL, LINKED_ONLY
  discord-to-mc: "ALL"
  # Webhook URL for premium chat bridge (player skin as avatar!)
  # Create a webhook in Discord channel settings → Integrations → Webhooks
  webhook-url: ""
  mc-to-discord: "ALL"
  ignored-prefixes:
    - "/"
    - "!"
    - "."

# ┌──────────────────────────────────────────────────────────────────────┐
# │  CONFIGURABLE COMMANDS                                               │
# ├──────────────────────────────────────────────────────────────────────┤
# │  Customize Discord slash command name                                │
# └──────────────────────────────────────────────────────────────────────┘
commands:
  discord-slash-command: "link"
  discord-slash-description: "Link your Minecraft account with Discord."

# ┌──────────────────────────────────────────────────────────────────────┐
# │  STORAGE                                                             │
# ├──────────────────────────────────────────────────────────────────────┤
# │  Backends: SQLITE (default), MYSQL, YAML                             │
# └──────────────────────────────────────────────────────────────────────┘
storage:
  type: "SQLITE"
  mysql:
    host: "localhost"
    port: 3306
    database: "cordsync_db"
    username: "root"
    password: "password"
  last-storage: "SQLITE"

# ┌──────────────────────────────────────────────────────────────────────┐
# │  REWARDS                                                             │
# ├──────────────────────────────────────────────────────────────────────┤
# │  Configurable reward system for linking, intervals, and boosters     │
# └──────────────────────────────────────────────────────────────────────┘
rewards:
  # ── First Link Reward ───────────────────────────────────────────────
  first-link:
    enabled: true
    message: "&a[CordSync] &e🎉 Congratulations! You earned your first linking reward!"
    commands:
      - "lp user {player} parent addtemp vip 7d"
      - "eco give {player} 5000"

  # ── Interval Reward ─────────────────────────────────────────────────
  interval:
    enabled: true
    every: "1d"
    message: "&a[CordSync] &e💎 Your Discord link is active! Daily reward added!"
    commands:
      - "eco give {player} 1000"

  # ── Booster Reward ──────────────────────────────────────────────────
  booster:
    enabled: true
    message: "&a[CordSync] &d🚀 Thanks for boosting! You earned a special booster reward!"
    commands:
      - "lp user {player} parent addtemp booster 30d"
      - "eco give {player} 10000"

# ┌──────────────────────────────────────────────────────────────────────┐
# │  REWARD LOGS                                                         │
# └──────────────────────────────────────────────────────────────────────┘
reward-logs:
  enabled: true
  type: "SQLITE"
  mysql-table: "cordsync_reward_logs"

# ┌──────────────────────────────────────────────────────────────────────┐
# │  COMPATIBILITY                                                       │
# ├──────────────────────────────────────────────────────────────────────┤
# │  Multi-version, Folia, and Proxy support settings                    │
# └──────────────────────────────────────────────────────────────────────┘
compatibility:
  # Folia support — uses regionalized scheduling when available
  folia: auto
  # Proxy mode — enable for BungeeCord/Velocity networks
  proxy:
    enabled: false
    # Options: BUNGEECORD, VELOCITY
    type: "BUNGEECORD"
# Console Bridge (Discord <-> Server Console)
console-bridge:
  enabled: false
  channel-id: ""
  admin-role-id: ""
  blocked-commands: "stop,restart,reload"
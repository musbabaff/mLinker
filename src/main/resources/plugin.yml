name: CordSync
main: com.nettyforge.cordsync.CordSync
version: 1.4.0
author: musbabaff (NettyForge Studios)
website: https://nettyforge.com
description: >
  Discord ↔ Minecraft account linking, verification and reward system.
  Fully modular structure with MySQL, SQLite, and YAML support.
api-version: 1.19
prefix: CordSync

softdepend:
  - Vault
  - LuckPerms
  - PlaceholderAPI
  - WorldGuard

commands:
  link:
    description: Link your Minecraft account with Discord.
    usage: /link
    aliases: [hesapesle, mlink, cslink]
    permission: cordsync.use

  unlink:
    description: Remove your Discord account link.
    usage: /unlink
    aliases: [hesapkaldir, munlink, csunlink]
    permission: cordsync.use

  staffchat:
    description: Send a cross-server message to online staff.
    usage: /staffchat <message>
    aliases: [sc, staffc]
    permission: cordsync.staffchat

  ticket:
    description: Open a robust two-way Discord ticket.
    aliases: [destek, csticket]
    permission: cordsync.ticket

  bug:
    description: Report a bug or technical issue on the server.
    usage: /bug <description>
    aliases: [bugreport, hata]
    permission: cordsync.bug

  csreload:
    description: Reload CordSync configuration files.
    usage: /csreload
    aliases: [cordsyncreload, csrl]
    permission: cordsync.admin

  csinfo:
    description: Show CordSync status, version info and API details.
    usage: /csinfo
    aliases: [cordsyncinfo, csver]
    permission: cordsync.admin

  csreverify:
    description: Manually start the smart re-verification system.
    usage: /csreverify
    aliases: [reverify, linkcheck]
    permission: cordsync.admin

  report:
    description: Report a player to the Discord admins
    usage: /report <player> <reason>

permissions:
  cordsync.use:
    description: Permission to use account linking and unlinking commands.
    default: true

  cordsync.admin:
    description: CordSync administrator permissions.
    default: op

  cordsync.rewards:
    description: Access to the reward system.
    default: op

  cordsync.reverify:
    description: Permission to manually start re-verification.
    default: op

  cordsync.api:
    description: CordSync API access and management.
    default: op

  cordsync.chat:
    description: Permission to use cross-chat messaging.
    default: true

load: POSTWORLD

authors:
  - musbabaff
  - NettyForge.art